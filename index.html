
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcutta 2026</title>
<style>
/* ── RESET & BASE ───────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#090910;color:#e4e4f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}

/* ── HEADER ─────────────────────────────────────────── */
.hdr{text-align:center;padding:32px 16px 20px}
.hdr-eye{font-size:10px;letter-spacing:4px;color:#4a4a66;text-transform:uppercase;margin-bottom:6px}
.hdr-title{font-size:40px;font-weight:800;color:#fff;letter-spacing:-1.5px;line-height:1}
.hdr-year{font-size:15px;letter-spacing:9px;color:#e05252;font-weight:600;margin-top:7px}
.live-pill{display:inline-flex;align-items:center;gap:7px;background:#160d0d;border:1.5px solid rgba(224,82,82,.45);border-radius:20px;padding:6px 14px;font-size:10px;font-weight:700;letter-spacing:1.8px;color:#e05252;margin-top:16px;text-transform:uppercase}
.pill-dot{width:6px;height:6px;border-radius:50%;background:#e05252;animation:blink 1.4s ease-in-out infinite;flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* ── TABS ────────────────────────────────────────────── */
.tabs-wrap{padding:4px 16px 20px;max-width:540px;margin:0 auto}
.tabs{display:flex;background:#10101a;border-radius:11px;padding:3px;gap:2px}
.tab{flex:1;padding:9px 4px;border:none;border-radius:8px;background:transparent;color:#4a4a66;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.tab.on{background:#1c1c2a;color:#e4e4f0;font-weight:600}

/* ── PANELS ──────────────────────────────────────────── */
.panel{display:none;padding:0 16px 52px;max-width:540px;margin:0 auto}
.panel.on{display:block}

/* ── SECTION LABEL ───────────────────────────────────── */
.slabel{font-size:10px;font-weight:600;letter-spacing:2.5px;color:#4a4a66;text-transform:uppercase;margin:0 0 11px}
.slabel.mt{margin-top:22px}

/* ── STANDINGS GRID ──────────────────────────────────── */
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.scard{background:#111119;border-radius:12px;padding:15px 14px 13px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc)}
.scard-rank{position:absolute;top:11px;right:12px;font-size:10px;color:#2e2e44;font-weight:700}
.scard-netlabel{font-size:8px;font-weight:700;letter-spacing:2px;color:#3a3a55;text-transform:uppercase;margin-bottom:2px}
.scard-net{font-size:24px;font-weight:800;line-height:1;color:#6a6a88}
.scard-net.pos{color:#22c55e}
.scard-name{font-size:13px;font-weight:600;margin-top:4px;color:#e4e4f0}
.scard-stats{font-size:10px;color:#4a4a66;margin-top:6px;line-height:1.75}
.scard-stats b{color:#7a7a96}

/* ── GAME ROWS ───────────────────────────────────────── */
.gsec{margin-bottom:24px}
.gsec-hdr{font-size:10px;font-weight:700;letter-spacing:2.5px;color:#4a4a66;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.gmatch-list{display:flex;flex-direction:column;gap:5px}
.gcard{background:#111119;border-radius:12px;overflow:hidden;border:1px solid #1e1e30}
.grow{display:grid;grid-template-columns:32px 1fr auto 72px;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid #18182a}
.grow:last-child{border-bottom:none}
.glogo{width:32px;height:32px;border-radius:8px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#3a3a55;flex-shrink:0}
.glogo-img{width:32px;height:32px;border-radius:8px;object-fit:contain;flex-shrink:0;background:#1a1a28}
.gteam-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#d4d4e8}
.gteam-name.elim{text-decoration:line-through;color:#2c2c40}
.gotag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;display:inline-block;margin-top:3px;letter-spacing:.3px}
.gscore{font-size:20px;font-weight:700;text-align:right;color:#d4d4e8}
.gscore.winner{color:#22c55e}
.gright{text-align:right;line-height:1.3}
.glive{color:#22c55e;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:flex-end;gap:4px}
.glive-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:blink 1.2s ease-in-out infinite;flex-shrink:0}
.gtime-detail{font-size:10px;color:#4a4a66;text-align:right;margin-top:1px}
.gfinal{font-size:10px;color:#4a4a66;font-weight:600;text-align:right}
.gsched{font-size:11px;color:#5a5a78;font-weight:500;text-align:right}
/* Concluded card — winner-centric layout */
.gconcl{padding:11px 13px 10px}
.gconcl-top{display:flex;align-items:center;gap:10px}
.gconcl-info{flex:1;min-width:0}
.gconcl-name{font-size:14px;font-weight:600;color:#22c55e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gconcl-tags{display:flex;align-items:center;gap:5px;margin-top:3px;flex-wrap:wrap}
.gconcl-score{font-size:26px;font-weight:800;color:#22c55e;line-height:1;white-space:nowrap}
.gconcl-final{font-size:8px;font-weight:700;letter-spacing:1.5px;color:#3a3a55;text-transform:uppercase;margin-top:2px;text-align:right}
.gconcl-def{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid #18182a}
.gconcl-def-logo{width:18px;height:18px;border-radius:4px;object-fit:contain;background:#1a1a28;flex-shrink:0}
.gconcl-def-logo-fb{width:18px;height:18px;border-radius:4px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#3a3a55;flex-shrink:0}
.gconcl-def-txt{font-size:11px;color:#3a3a55;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gconcl-def-score{font-size:11px;color:#2c2c40;font-weight:600;white-space:nowrap}
.dimtxt{color:#2c2c40}

/* ── ROSTER COLUMNS ──────────────────────────────────── */
.roster-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:thin;scrollbar-color:#2a2a3a transparent}
.roster-scroll::-webkit-scrollbar{height:3px}
.roster-scroll::-webkit-scrollbar-track{background:transparent}
.roster-scroll::-webkit-scrollbar-thumb{background:#2a2a3a;border-radius:3px}
.rcol{min-width:148px;background:#111119;border-radius:12px;overflow:hidden;flex-shrink:0}
.rcol-hdr{padding:13px 12px 10px;text-align:center;border-bottom:1px solid #18182a;position:relative}
.rcol-hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--oc)}
.rcol-name{font-size:14px;font-weight:700;color:var(--oc)}
.rcol-sub{font-size:10px;color:#4a4a66;margin-top:3px;line-height:1.5}
.rcol-earned{font-size:11px;font-weight:600;margin-top:2px}
.trow{position:relative;display:flex;align-items:center;justify-content:center;padding:6px 10px;min-height:38px;border-bottom:1px solid #14141e}
.trow:last-child{border-bottom:none}
.tlogo{position:absolute;left:10px;width:28px;height:28px;border-radius:7px;object-fit:contain;background:#1a1a28}
.tlogo-seed{position:absolute;left:10px;width:28px;height:28px;border-radius:7px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#34344a}
.tseed{display:none}
.tname{font-size:11px;line-height:1.25;color:#b0b0cc;text-align:center;padding:0 36px}
.tseed-num{font-size:9px;font-weight:700;color:#3a3a55;margin-right:4px}
.tname.alive{color:#c8c8e0}
.tname.won{color:#22c55e;font-weight:500}
.tname.live{color:#f59e0b}
.tname.elim{text-decoration:line-through;color:#2c2c3e;font-weight:400}
.tbadge{position:absolute;right:10px;font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;letter-spacing:.3px}
.tbadge.won{background:#0d2018;color:#22c55e}
.tbadge.live{background:#271a06;color:#f59e0b}
.tbadge.elim{background:#1e0e1a;color:#7a3070}
.tbadge.pending{background:#181826;color:#34344a}
.tbadge.money{background:#0a2010;color:#4ade80;font-size:9px;padding:2px 6px;letter-spacing:.2px}
.rcol-rank{width:16px;height:16px;border-radius:4px;background:var(--oc);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#000;flex-shrink:0;opacity:.9}

/* ── PAYOUTS ─────────────────────────────────────────── */
.prow{background:#111119;border-radius:11px;padding:14px;margin-bottom:8px}
.prow-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.prow-left{flex:1;min-width:0}
.prow-name{font-size:12px;font-weight:600;color:#c4c4dc}
.prow-pct{font-size:10px;color:#4a4a66;margin-top:2px}
.prow-amt{font-size:15px;font-weight:700;color:#f59e0b;white-space:nowrap}
.prow-note{font-size:10px;color:#4a4a66;margin-top:6px;line-height:1.65}
.prow-sep{height:1px;background:#18182a;margin:9px 0}
.prow-winners{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pwinner{display:inline-flex;align-items:center;gap:6px;background:#18182a;border-radius:6px;padding:5px 10px 5px 6px;font-size:11px}
.pw-name{color:#c4c4dc}
.pw-amt{color:#22c55e;font-weight:700;font-size:11px;margin-left:2px}
.pw-owner{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.pw-amt{color:#22c55e;font-weight:600;font-size:11px}
.prow-tbd{font-size:10px;color:#2e2e44;font-style:italic;margin-top:7px}
.prow-special{font-size:10px;color:#7a7a96;margin-top:6px;line-height:1.6;background:#14141e;border-radius:6px;padding:8px 10px}

/* ── OWNER DETAIL VIEW ───────────────────────────────── */
.od-back{display:flex;align-items:center;gap:6px;background:none;border:none;color:#4a4a66;font-size:11px;font-weight:600;letter-spacing:.5px;cursor:pointer;padding:0 0 16px;text-transform:uppercase;letter-spacing:1.5px}
.od-back:hover{color:#8a8aaa}
.od-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px}
.od-name{font-size:26px;font-weight:800;line-height:1;color:var(--oc)}
.od-paid{font-size:11px;color:#4a4a66;margin-top:4px}
.od-net{font-size:22px;font-weight:800;text-align:right;line-height:1}
.od-net.pos{color:#22c55e}
.od-net.neg{color:#6a6a88}
.od-netlabel{font-size:8px;font-weight:700;letter-spacing:2px;color:#3a3a55;text-transform:uppercase;text-align:right;margin-top:2px}
.od-stats{display:flex;gap:0;margin:14px 0 20px;background:#111119;border-radius:10px;overflow:hidden;border:1px solid #1e1e30}
.od-stat{flex:1;text-align:center;padding:10px 4px;border-right:1px solid #1e1e30}
.od-stat:last-child{border-right:none}
.od-stat-n{font-size:18px;font-weight:800;color:#e4e4f0;line-height:1}
.od-stat-n.green{color:#22c55e}
.od-stat-n.amber{color:#f59e0b}
.od-stat-n.red{color:#ef4444}
.od-stat-lbl{font-size:8px;font-weight:600;letter-spacing:1.5px;color:#3a3a55;text-transform:uppercase;margin-top:3px}
.od-empty{text-align:center;color:#2e2e44;font-size:11px;padding:16px 0;font-style:italic}

/* ── UTIL ────────────────────────────────────────────── */
.dimtxt{color:#4a4a66}
.greentxt{color:#22c55e}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#252535;border-radius:4px}
</style>
</head>

/* Returns the projected advancer from a bracket pair.
   certain:true = guaranteed; certain:false = game still pending */
function projectedAdvancer(region, seeds) {
  var ts = TEAMS.filter(function(t){
    return t.region === region && seeds.indexOf(t.seed) > -1;
  });
  var won   = ts.filter(function(t){ return t.status === 'won'; });
  var alive = ts.filter(function(t){ return t.status === 'alive' || t.status === 'live'; });
  if (won.length === 1)   return { team: won[0],   certain: true,  alt: null };
  if (alive.length === 1) return { team: alive[0], certain: true,  alt: null }; /* other lost */
  if (alive.length === 2) return { team: alive[0], certain: false, alt: alive[1] }; /* both pending */
  return null;
}

/* ═══════════════════════════════════════════════════════
   DERIVED CALCULATIONS
═══════════════════════════════════════════════════════ */

function getR1Winners() {
  return TEAMS.filter(function(t){ return t.r1eligible && t.status === 'won'; });
}

function getR1PerTeam() {
  var w = getR1Winners().length;
  return w > 0 ? Math.ceil(POTS.r1 / w) : 0;
}

function ownerEarned(oid) {
  var total = 0;
  var r1pp = getR1PerTeam();
  TEAMS.forEach(function(t) {
    if (t.owner !== oid) return;
    if (t.status === 'won' && t.r1eligible) total += r1pp;
  });
  return total;
}

function teamEarned(t) {
  /* Returns dollars this specific team has earned so far */
  var total = 0;
  if (t.r1eligible && t.status === 'won') total += getR1PerTeam();
  return total;
}

function ownerAlive(oid) {
  return TEAMS.filter(function(t){ return t.owner === oid && t.status !== 'lost'; }).length;
}

function ownerTotal(oid) {
  return TEAMS.filter(function(t){ return t.owner === oid; }).length;
}

function ownerNet(oid) {
  return ownerEarned(oid) - OWNERS[oid].paid;
}

/* ═══════════════════════════════════════════════════════
   ESPN LIVE DATA
═══════════════════════════════════════════════════════ */

var liveGames = [];
var completedGames = [];
var upcomingGames = [];

function espnNameMatch(espnName) {
  var n = (espnName || '').toLowerCase().trim();
  /* Exact match only — partial matching causes Texas → Texas A&M / Texas Tech false positives */
  for (var i = 0; i < TEAMS.length; i++) {
    var t = TEAMS[i];
    for (var j = 0; j < t.espn.length; j++) {
      if (n === t.espn[j]) return t;
    }
  }
  return null;
}

function fetchESPN(dateStr) {
  var url = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard?dates=' + dateStr;
  return fetch(url).then(function(r){ return r.json(); }).catch(function(){ return null; });
}

function processESPN(data) {
  if (!data || !data.events) return;
  data.events.forEach(function(ev) {
    if (!ev.competitions || !ev.competitions[0]) return;
    var comp = ev.competitions[0];
    var comps = comp.competitors;
    if (!comps || comps.length < 2) return;

    var s = comp.status && comp.status.type ? comp.status.type.state : 'pre';
    var detail = comp.status && comp.status.type ? comp.status.type.shortDetail : '';

    var teams = comps.map(function(c) {
      /* shortDisplayName = "Florida", displayName = "Florida Gators" — use short first */
      var nm    = c.team ? (c.team.shortDisplayName || c.team.displayName || '') : '';
      var nmAlt = c.team ? (c.team.displayName || '') : '';
      var matched = espnNameMatch(nm) || espnNameMatch(nmAlt);
      var sc = parseInt(c.score || '0', 10) || 0;
      var winner = c.winner === true;
      /* Construct logo URL from team ID (always present) or fall back to logo field.
         ESPN CDN: https://a.espncdn.com/i/teamlogos/ncaa/500/{id}.png */
      var logoUrl = '';
      if (c.team) {
        if (c.team.id) {
          logoUrl = 'https://a.espncdn.com/i/teamlogos/ncaa/500/' + c.team.id + '.png';
        } else if (c.team.logo) {
          logoUrl = c.team.logo;
        } else if (c.team.logos && c.team.logos.length) {
          logoUrl = c.team.logos[0].href || c.team.logos[0].url || '';
        }
      }
      return { espnName: nm, matched: matched, score: sc, winner: winner, homeAway: c.homeAway, logoUrl: logoUrl };
    });

    /* Update team statuses + logos from ESPN — never downgrade a confirmed win */
    teams.forEach(function(t) {
      if (!t.matched) return;
      if (t.logoUrl && !t.matched.logo) t.matched.logo = t.logoUrl;
      if (s === 'post') {
        var next = t.winner ? 'won' : 'lost';
        if (t.matched.status === 'won' && next === 'lost') return;
        t.matched.status = next;
      } else if (s === 'in') {
        if (t.matched.status !== 'won') t.matched.status = 'live';
      }
    });

    var gameObj = {
      id: ev.id,
      state: s,
      detail: detail,
      date: ev.date || '',   /* ISO tip-off time for sorting */
      t1: teams[0],
      t2: teams[1],
      title: ev.shortName || ''
    };

    /* Deduplicate */
    function removeFromAll(id) {
      liveGames      = liveGames.filter(function(g){ return g.id !== id; });
      completedGames = completedGames.filter(function(g){ return g.id !== id; });
      upcomingGames  = upcomingGames.filter(function(g){ return g.id !== id; });
    }
    removeFromAll(gameObj.id);

    if (s === 'in')   liveGames.push(gameObj);
    else if (s === 'post') completedGames.push(gameObj);
    else upcomingGames.push(gameObj);
  });
}

function fetchAll() {
  /* Fetch all 4 days of R1 (Mar 20-23) so ESPN returns team+logo data
     for every team — even games that haven't been played yet.
     Also fetch today/yesterday dynamically in case the app is used
     outside tournament dates. */
  var r1Dates = ['20260320','20260321','20260322','20260323'];
  var today = new Date();
  var d = today.toISOString().slice(0,10).replace(/-/g,'');
  var yesterday = new Date(today); yesterday.setDate(yesterday.getDate()-1);
  var y = yesterday.toISOString().slice(0,10).replace(/-/g,'');
  /* Merge, deduplicate */
  var dates = r1Dates.slice();
  if (dates.indexOf(d) === -1) dates.push(d);
  if (dates.indexOf(y) === -1) dates.push(y);

  Promise.all(dates.map(fetchESPN)).then(function(results) {
    results.forEach(function(r){ if(r) processESPN(r); });
    renderAll();
  });
}

function renderStandings() {
  var el = document.getElementById('standings-grid');
  if (!el) return;

  /* Sort by earned descending, then by net as tiebreaker */
  var sorted = Object.keys(OWNERS).sort(function(a,b){
    var diff = ownerEarned(b) - ownerEarned(a);
    return diff !== 0 ? diff : ownerNet(b) - ownerNet(a);
  });

  var html = '';
  sorted.forEach(function(oid, i) {
    var o = OWNERS[oid];
    var net = ownerNet(oid);
    var earned = ownerEarned(oid);
    var alive = ownerAlive(oid);
    var total = ownerTotal(oid);
    var netStr = (net >= 0 ? '+$' : '-$') + Math.abs(Math.round(net)).toLocaleString();
    var cls = net >= 0 ? 'pos' : '';
    /* Center the lone last card when total count is odd */
    var isLast = (i === sorted.length - 1) && (sorted.length % 2 === 1);
    var style = 'style="--oc:' + o.color + (isLast ? ';grid-column:1/-1;max-width:calc(50% - 4px);margin:0 auto;width:100%' : '') + '"';
    html +=
      '<div class="scard" ' + style + '>' +
        '<div class="scard-rank">#' + (i+1) + '</div>' +
        '<div class="scard-netlabel">Net Position</div>' +
        '<div class="scard-net ' + cls + '">' + netStr + '</div>' +
        '<div class="scard-name">' + o.name + '</div>' +
        '<div class="scard-stats">' +
          'Paid: <b>$' + o.paid.toLocaleString() + '</b><br>' +
          'Earned: <b style="color:' + (earned > 0 ? '#22c55e' : '#4a4a66') + '">' + (earned > 0 ? '+$'+Math.round(earned).toLocaleString() : '$0') + '</b><br>' +
          alive + '/' + total + ' teams alive' +
        '</div>' +
      '</div>';
  });
  el.innerHTML = html;
}

function renderTeams() {
  var el = document.getElementById('roster-scroll');
  if (!el) return;

  /* Sort owners by earned desc, then paid desc as tiebreaker */
  var sorted = Object.keys(OWNERS).sort(function(a,b){
    var diff = ownerEarned(b) - ownerEarned(a);
    return diff !== 0 ? diff : OWNERS[b].paid - OWNERS[a].paid;
  });

  var html = '';
  sorted.forEach(function(oid, rank) {
    var o = OWNERS[oid];
    var myTeams = TEAMS.filter(function(t){ return t.owner === oid; })
                       .sort(function(a,b){ return a.seed - b.seed; });
    var earned = ownerEarned(oid);
    var net = ownerNet(oid);
    var netStr = (net >= 0 ? '+$' : '-$') + Math.abs(Math.round(net)).toLocaleString();
    var netColor = net >= 0 ? '#22c55e' : '#4a4a66';

    html += '<div class="rcol" style="--oc:' + o.color + '">' +
      '<div class="rcol-hdr">' +
        '<div style="display:flex;align-items:center;gap:7px">' +
          '<span class="rcol-rank">' + (rank + 1) + '</span>' +
          '<div class="rcol-name">' + o.name + '</div>' +
          (earned > 0 ? '<span style="font-size:10px;font-weight:700;color:#4ade80;margin-left:2px">+$' + Math.round(earned).toLocaleString() + '</span>' : '') +
        '</div>' +
        '<div class="rcol-sub">' + myTeams.length + ' teams · $' + o.paid.toLocaleString() + '</div>' +
        '<div class="rcol-earned" style="color:' + netColor + '">' + netStr + '</div>' +
      '</div>';

    myTeams.forEach(function(t) {
      var earned = teamEarned(t);
      var badgeHtml = '';
      var nameCls = 'tname alive';
      if (t.status === 'won') {
        nameCls = 'tname won';
        /* Show earnings if any, otherwise plain W */
        badgeHtml = earned > 0
          ? '<span class="tbadge money">+$' + Math.round(earned).toLocaleString() + '</span>'
          : '<span class="tbadge won">W</span>';
      } else if (t.status === 'live') {
        nameCls = 'tname live';
        badgeHtml = '<span class="tbadge live">▶</span>';
      } else if (t.status === 'lost') {
        nameCls = 'tname elim';
        badgeHtml = '<span class="tbadge elim">✕</span>';
      }

      var logoSrc = t.logo || LOGOS[t.name] || '';
      var logoHtml = logoSrc
        ? '<img class="tlogo" src="' + logoSrc + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
        : '<div class="tlogo-seed">' + t.seed + '</div>';
      html += '<div class="trow">' +
        logoHtml +
        '<div class="' + nameCls + '"><span class="tseed-num">' + t.seed + '</span>' + t.name + '</div>' +
        badgeHtml +
      '</div>';
    });

    html += '</div>';
  });
  el.innerHTML = html;
}

function ownerTag(teamObj) {
  if (!teamObj || !teamObj.matched) return '';
  var oid = teamObj.matched.owner;
  var o = OWNERS[oid];
  if (!o) return '';
  /* Dark contrast text on colored pill */
  return '<span class="gotag" style="background:' + o.color + ';color:#000">' + o.name + '</span>';
}

function gameRowHtml(g) {
  var t1 = g.t1, t2 = g.t2;
  var isLive = g.state === 'in';
  var isDone = g.state === 'post';

  function teamRow(t, opp) {
    var nameCls = (isDone && !t.winner) ? 'gteam-name elim' : 'gteam-name';
    var scoreCls = (isDone && t.winner) ? 'gscore winner' : 'gscore';
    var logoTxt = t.espnName ? t.espnName.charAt(0).toUpperCase() : '?';
    if (t.matched) logoTxt = t.matched.name.slice(0,2).toUpperCase();

    var scoreHtml = (isLive || isDone)
      ? '<div class="' + scoreCls + '">' + t.score + '</div>'
      : '<div class="gscore dimtxt">–</div>';

    return '<div class="grow">' +
      '<div class="glogo">' + logoTxt + '</div>' +
      '<div class="gteam"><div class="' + nameCls + '">' + t.espnName + '</div>' + ownerTag(t) + '</div>' +
      scoreHtml +
      '<div class="gright"></div>' +
    '</div>';
  }

  /* Status column for first team row */
  var statusHtml = '';
  if (isLive) {
    /* #1: show clock once only — in gright, not repeated */
    statusHtml = '<div class="glive"><span class="glive-dot"></span>LIVE</div>' +
                 '<div class="gtime-detail">' + g.detail + '</div>';
  } else if (isDone) {
    statusHtml = '<div class="gfinal">Final</div>';
  } else {
    statusHtml = '<div class="gsched">' + formatTipoff(g.date, g.detail) + '</div>';
  }

  /* #3: payout callout for R1 winners in concluded games */
  function payoutBadge(t) {
    if (!isDone || !t.winner) return '';
    if (!t.matched || !t.matched.r1eligible) return '';
    var pp = getR1PerTeam();
    if (!pp) return '';
    return '<span style="font-size:9px;font-weight:700;color:#4ade80;background:#0a2010;padding:1px 5px;border-radius:3px;margin-left:5px">+$' + pp + ' R1</span>';
  }

  /* Build two-row matchup */
  function glogoHtml(t) {
    var src = (t.matched && (t.matched.logo || LOGOS[t.matched.name])) || (t.logoUrl) || '';
    if (src) return '<img class="glogo-img" src="' + src + '" alt="" onerror="this.style.display=\'none\'">';
    var abbr = t.matched ? t.matched.name.slice(0,2).toUpperCase() : (t.espnName||'?').charAt(0).toUpperCase();
    return '<div class="glogo">' + abbr + '</div>';
  }
  function nameCls(t) { return (isDone && !t.winner) ? 'gteam-name elim' : 'gteam-name'; }
  function scoreCls(t){ return (isDone && t.winner) ? 'gscore winner' : 'gscore'; }

  /* #4: in concluded games, don't show score for loser — just dim them out */
  function scoreHtml(t) {
    if (isLive || isDone) {
      if (isDone && !t.winner) return '<div class="gscore" style="color:#2c2c40;font-size:14px">' + t.score + '</div>';
      return '<div class="' + scoreCls(t) + '">' + t.score + '</div>';
    }
    return '<div class="gscore dimtxt"></div>';
  }

  var row = '<div class="grow">' +
      glogoHtml(t1) +
      '<div class="gteam"><div class="' + nameCls(t1) + '">' + t1.espnName + '</div>' +
        '<div style="display:flex;align-items:center">' + ownerTag(t1) + payoutBadge(t1) + '</div>' +
      '</div>' +
      scoreHtml(t1) +
      '<div class="gright">' + statusHtml + '</div>' +
    '</div>' +
    '<div class="grow">' +
      glogoHtml(t2) +
      '<div class="gteam"><div class="' + nameCls(t2) + '">' + t2.espnName + '</div>' +
        '<div style="display:flex;align-items:center">' + ownerTag(t2) + payoutBadge(t2) + '</div>' +
      '</div>' +
      scoreHtml(t2) +
      '<div class="gright"></div>' +
    '</div>';

  return row;
}

/* Clean winner-centric card for concluded games */
function concludedCardHtml(g) {
  var winner = (g.t1.winner) ? g.t1 : (g.t2.winner ? g.t2 : null);
  var loser  = (g.t1.winner) ? g.t2 : (g.t2.winner ? g.t1 : null);
  /* Fallback: no winner flag set yet — use old format */
  if (!winner) return gameRowHtml(g);

  function logoImg(t, cls) {
    var src = (t.matched && (t.matched.logo || LOGOS[t.matched.name])) || t.logoUrl || '';
    return src
      ? '<img class="' + cls + '" src="' + src + '" alt="" onerror="this.style.display=\'none\'">'
      : '<div class="' + cls + '-fb">' + (t.matched ? t.matched.name.slice(0,1) : '?') + '</div>';
  }

  var winName  = winner.matched ? winner.matched.name : winner.espnName;
  var loseName = loser.matched  ? loser.matched.name  : loser.espnName;

  /* Payout — shown once, only here */
  var pp = getR1PerTeam();
  var payoutHtml = (winner.matched && winner.matched.r1eligible && pp)
    ? '<span style="font-size:9px;font-weight:700;color:#4ade80;background:#0a2010;padding:1px 5px;border-radius:3px">+$' + pp + ' R1</span>'
    : '';

  var winTag = '';
  if (winner.matched && winner.matched.owner && OWNERS[winner.matched.owner]) {
    var wo = OWNERS[winner.matched.owner];
    winTag = '<span class="gotag" style="background:' + wo.color + ';color:#000">' + wo.name + '</span>';
  }
  var loseTag = '';
  if (loser.matched && loser.matched.owner && OWNERS[loser.matched.owner]) {
    var lo = OWNERS[loser.matched.owner];
    loseTag = '<span style="font-size:9px;font-weight:600;color:' + lo.color + ';opacity:.45">' + lo.name + '</span>';
  }

  return '<div class="gconcl">' +
    /* Winner row */
    '<div class="gconcl-top">' +
      logoImg(winner, 'glogo-img') +
      '<div class="gconcl-info">' +
        '<div class="gconcl-name">' + winName + '</div>' +
        '<div class="gconcl-tags">' + winTag + payoutHtml + '</div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div class="gconcl-score">' + winner.score + '</div>' +
        '<div class="gconcl-final">Final</div>' +
      '</div>' +
    '</div>' +
    /* Loser compact row — score once, no redundancy */
    '<div class="gconcl-def">' +
      logoImg(loser, 'gconcl-def-logo') +
      '<div class="gconcl-def-txt">def. ' + loseName + (loseTag ? ' · ' : '') + '</div>' +
      loseTag +
      '<div class="gconcl-def-score">' + loser.score + '</div>' +
    '</div>' +
  '</div>';
}

/* Render one row of a projected R32 matchup */
function projRowHtml(adv, isFirst, regionLabel) {
  var t = adv ? adv.team : null;
  var certain = adv ? adv.certain : false;
  var alt = adv ? adv.alt : null;

  /* Logo */
  var src = t ? (t.logo || LOGOS[t.name] || '') : '';
  var logoHtml = src
    ? '<img class="glogo-img" src="' + src + '" style="opacity:' + (certain ? '1' : '0.5') + '" alt="" onerror="this.style.display=\'none\'">'
    : '<div class="glogo" style="opacity:' + (certain ? '1' : '0.4') + '">' + (t ? t.seed : '?') + '</div>';

  /* Name */
  var nameStr = t
    ? (certain
        ? t.name
        : (alt ? t.name + ' <span style="color:#3a3a55">/ ' + alt.name + '</span>' : t.name))
    : 'TBD';
  var nameColor = certain ? '#d4d4e8' : '#6a6a88';
  var wonDot = (t && t.status === 'won') ? ' <span style="color:#22c55e;font-size:9px">✓</span>' : '';

  /* Owner tag */
  var tagHtml = '';
  if (t && t.owner && OWNERS[t.owner]) {
    var o = OWNERS[t.owner];
    tagHtml = '<span class="gotag" style="background:' + o.color + ';color:#000;opacity:' + (certain ? '1' : '0.5') + '">' + o.name + '</span>';
  }

  /* Right side — only on first row */
  var rightHtml = isFirst
    ? '<div style="font-size:9px;font-weight:700;letter-spacing:1px;color:#2e2e44;text-align:right">R32</div>'
    : '<div></div>';

  return '<div class="grow">' +
    logoHtml +
    '<div class="gteam"><div class="gteam-name" style="color:' + nameColor + '">' + nameStr + wonDot + '</div>' + tagHtml + '</div>' +
    '<div></div>' +
    rightHtml +
  '</div>';
}

function renderProjectedR32() {
  /* Only show matchups where at least one side is determined */
  var cards = '';
  BRACKET_R32.forEach(function(pair) {
    var advA = projectedAdvancer(pair.region, pair.a);
    var advB = projectedAdvancer(pair.region, pair.b);
    if (!advA && !advB) return;
    /* Skip if both sides are entirely TBD (no games played on either side yet) */
    var aKnown = advA && (advA.certain || advA.team);
    var bKnown = advB && (advB.certain || advB.team);
    if (!aKnown && !bKnown) return;
    cards += '<div class="gcard" style="opacity:0.85">' +
      projRowHtml(advA, true,  pair.region) +
      projRowHtml(advB, false, pair.region) +
    '</div>';
  });
  if (!cards) return '';
  return '<div class="gsec">' +
    '<div class="gsec-hdr" style="color:#3a3a55">Round of 32 · Projected</div>' +
    '<div class="gmatch-list">' + cards + '</div>' +
  '</div>';
}

/* Convert UTC ISO date to ET local date string YYYY-MM-DD */
function toETDate(isoDate) {
  if (!isoDate) return '';
  var d = new Date(isoDate);
  /* March = EDT (UTC-4) */
  var et = new Date(d.getTime() - 4 * 60 * 60 * 1000);
  return et.toISOString().slice(0, 10);
}

/* Format tip-off time for display: "7:25 PM ET" */
function formatTipoff(isoDate, fallback) {
  if (!isoDate) return fallback || '';
  var d = new Date(isoDate);
  var et = new Date(d.getTime() - 4 * 60 * 60 * 1000);
  var h = et.getUTCHours(), m = et.getUTCMinutes();
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + (m < 10 ? '0' + m : m) + ' ' + ampm + ' ET';
}

/* Section date label: "MAR 20 · ROUND OF 64" */
function dateSectionLabel(ymd) {
  var months = ['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var parts = ymd.split('-');
  return months[parseInt(parts[1], 10)] + ' ' + parseInt(parts[2], 10) + ' · ROUND OF 64';
}

function renderGames() {
  var el = document.getElementById('games-content');
  if (!el) return;

  var html = '';

  /* ── 1. LIVE NOW ── */
  if (liveGames.length > 0) {
    html += '<div class="gsec">' +
      '<div class="gsec-hdr"><span class="pill-dot"></span>Live Now</div>' +
      '<div class="gmatch-list">';
    liveGames.forEach(function(g) {
      html += '<div class="gcard">' + gameRowHtml(g) + '</div>';
    });
    html += '</div></div>';
  }

  /* Helper: render a section of games grouped by ET date */
  function renderDateGroup(games, sortAsc) {
    var sorted = games.slice().sort(function(a, b) {
      var cmp = (a.date || '').localeCompare(b.date || '');
      return sortAsc ? cmp : -cmp;
    });
    var groups = {}, order = [];
    sorted.forEach(function(g) {
      var d = toETDate(g.date) || 'unknown';
      if (!groups[d]) { groups[d] = []; order.push(d); }
      groups[d].push(g);
    });
    var out = '';
    order.forEach(function(d) {
      var label = d === 'unknown' ? 'ROUND OF 64' : dateSectionLabel(d);
      out += '<div class="gsec"><div class="gsec-hdr">' + label + '</div><div class="gmatch-list">';
      groups[d].forEach(function(g) { out += '<div class="gcard">' + gameRowHtml(g) + '</div>'; });
      out += '</div></div>';
    });
    return out;
  }

  /* ── 2. NEXT UP — upcoming sorted earliest first, grouped by date ── */
  if (upcomingGames.length > 0) {
    html += renderDateGroup(upcomingGames, true);
  }

  /* ── 2b. ROUND OF 32 PROJECTED ── */
  html += renderProjectedR32();

  /* ── 3. CONCLUDED — winner-centric cards, most recent first ── */
  if (completedGames.length > 0) {
    html += '<div class="gsec-hdr" style="margin:4px 0 10px;font-size:10px;font-weight:700;letter-spacing:2.5px;color:#4a4a66;text-transform:uppercase">Concluded</div>';
    /* Use concludedCardHtml for clean layout — score shown once, no redundancy */
    var sortedDone = completedGames.slice().sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    var doneGroups = {}, doneOrder = [];
    sortedDone.forEach(function(g) {
      var d = toETDate(g.date) || 'unknown';
      if (!doneGroups[d]) { doneGroups[d] = []; doneOrder.push(d); }
      doneGroups[d].push(g);
    });
    doneOrder.forEach(function(d) {
      var label = d === 'unknown' ? 'ROUND OF 64' : dateSectionLabel(d);
      html += '<div class="gsec"><div class="gsec-hdr">' + label + '</div><div class="gmatch-list">';
      doneGroups[d].forEach(function(g) { html += '<div class="gcard">' + concludedCardHtml(g) + '</div>'; });
      html += '</div></div>';
    });
  }

  if (!html) {
    html = '<div style="text-align:center;color:#4a4a66;padding:40px 16px;font-size:12px">Loading games…</div>';
  }

  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   RENDER: PAYOUTS
═══════════════════════════════════════════════════════ */

function renderPayouts() {
  var el = document.getElementById('payouts-content');
  if (!el) return;

  var r1pp = getR1PerTeam();
  var r1w  = getR1Winners();

  function ownerTag2(oid) {
    var o = OWNERS[oid];
    return '<span style="background:' + o.color + ';color:#000;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;">' + o.name + '</span>';
  }

  function pLogoHtml(t) {
    var src = t.logo || LOGOS[t.name] || '';
    if (src) return '<img src="' + src + '" style="width:20px;height:20px;border-radius:4px;object-fit:contain;background:#1a1a28;flex-shrink:0" onerror="this.style.display=\'none\'">';
    return '<div style="width:20px;height:20px;border-radius:4px;background:#1a1a28;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:800;color:#3a3a55;flex-shrink:0">' + t.seed + '</div>';
  }

  /* R1 */
  var r1WinnersHtml = r1w.length > 0
    ? r1w.map(function(t){
        return '<div class="pwinner">' + pLogoHtml(t) + '<span class="pw-name">' + t.name + '</span>' + ownerTag2(t.owner) + '<span class="pw-amt">+$' + r1pp.toLocaleString() + '</span></div>';
      }).join('')
    : '<div class="prow-tbd">No winners yet</div>';

  var html =
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Round of 64 Winners</div><div class="prow-pct">10% of pot · 8–16 seeds only · split equally</div></div>' +
        '<div class="prow-amt">$' + POTS.r1.toLocaleString() + '</div>' +
      '</div>' +
      '<div class="prow-note">$' + r1pp + ' per winner · ' + r1w.length + ' confirmed so far</div>' +
      '<div class="prow-winners">' + r1WinnersHtml + '</div>' +
    '</div>';

  /* S16 */
  var s16Eligible = TEAMS.filter(function(t){ return t.seed >= 4 && t.status !== 'lost'; });
  html +=
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Sweet 16</div><div class="prow-pct">23% of pot · seeds 4–16 only · split equally</div></div>' +
        '<div class="prow-amt">$' + POTS.s16.toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-note">~$' + Math.ceil(POTS.s16/16) + '/team if 16 teams advance · ' + s16Eligible.length + ' eligible teams still alive</div>' +
      '<div class="prow-tbd">Winners determined after Round of 32</div>' +
    '</div>';

  /* E8 */
  var e8Eligible = TEAMS.filter(function(t){ return t.top3 && t.status !== 'lost'; });
  html +=
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Elite 8</div><div class="prow-pct">10% of pot · seeds 1–3 only · split equally</div></div>' +
        '<div class="prow-amt">$' + POTS.e8.toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-note">' + e8Eligible.length + ' eligible teams (seeds 1–3) still alive<br>' +
      e8Eligible.map(function(t){ return '<span style="color:#7a7a96">' + t.seed + ' ' + t.name + ' (' + OWNERS[t.owner].name + ')</span>'; }).join(' · ') +
      '</div>' +
    '</div>';

  /* F4 */
  html +=
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Final Four</div><div class="prow-pct">28% of pot · fixed per team, not split</div></div>' +
        '<div class="prow-amt">$' + Math.round(POTS.f4 * 4).toLocaleString() + '</div>' +
      '</div>' +
      '<div class="prow-note">$' + POTS.f4.toFixed(0) + ' per team regardless of how many advance — no dilution</div>' +
      '<div class="prow-tbd">4 spots available</div>' +
    '</div>';

  /* Finals */
  html +=
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Championship Game</div><div class="prow-pct">8% of pot · both finalists, fixed</div></div>' +
        '<div class="prow-amt">$' + (POTS.finals * 2).toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-note">$' + POTS.finals.toFixed(0) + ' per finalist — regardless of outcome</div>' +
      '<div class="prow-tbd">2 spots available</div>' +
    '</div>';

  /* Champ */
  html +=
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">National Champion</div><div class="prow-pct">9% of pot</div></div>' +
        '<div class="prow-amt">$' + POTS.champ.toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-tbd">Winner takes all</div>' +
    '</div>';

  /* Special pots */
  html +=
    '<div class="slabel mt">Special Side Pots</div>' +
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Biggest R1 Loss</div><div class="prow-pct">4% of pot</div></div>' +
        '<div class="prow-amt">$' + POTS.loss.toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-special">Largest point-margin defeat in Round of 64. Tiebreaker: lowest points scored. If still tied, teams split.</div>' +
    '</div>' +
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Biggest Upset</div><div class="prow-pct">4% of pot</div></div>' +
        '<div class="prow-amt">$' + POTS.upset.toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-special">Largest seed differential upset throughout the tournament. Tiebreaker: higher seed wins. Example: 13-over-4 beats 11-over-2 (same diff, 13 is higher seed).</div>' +
    '</div>' +
    '<div class="prow">' +
      '<div class="prow-hdr">' +
        '<div class="prow-left"><div class="prow-name">Best #15 / #16 Seed</div><div class="prow-pct">4% of pot</div></div>' +
        '<div class="prow-amt">$' + POTS.seed15.toFixed(0) + '</div>' +
      '</div>' +
      '<div class="prow-special">Awarded to the 15 or 16 seed that goes furthest. If tied, determined by margin of defeat in final shared round.</div>' +
    '</div>';

  el.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════
   TAB SWITCHING
═══════════════════════════════════════════════════════ */

function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('on'); });
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  document.getElementById('panel-' + name).classList.add('on');
  btn.classList.add('on');
  renderAll();
}

/* ═══════════════════════════════════════════════════════
   RENDER ALL
═══════════════════════════════════════════════════════ */

function renderAll() {
  renderStandings();
  renderTeams();
  renderGames();
  renderPayouts();
}

/* ═══════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════ */

renderAll();
fetchAll();
setInterval(fetchAll, 30000);
