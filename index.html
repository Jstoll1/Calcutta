<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeedMoney Live</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f8fafc;
      --muted: #94a3b8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --blue: #60a5fa;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #08101d, #0f172a);
      color: var(--text);
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 6px 0;
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
    }

    .header-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    .button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 800;
      cursor: pointer;
    }

    .button:hover {
      filter: brightness(1.08);
    }

    .stamp {
      color: var(--muted);
      font-size: 13px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(265px, 1fr));
      gap: 14px;
    }

    .card {
      background: rgba(17,24,39,0.92);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      min-height: 196px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .seed {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .team {
      font-size: 20px;
      font-weight: 900;
      line-height: 1.08;
    }

    .badge {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.pre { color: var(--blue); background: rgba(96,165,250,0.10); }
    .badge.live { color: #fde68a; background: rgba(245,158,11,0.12); }
    .badge.final { color: #bbf7d0; background: rgba(34,197,94,0.12); }
    .badge.off { color: #fecaca; background: rgba(239,68,68,0.12); }

    .score-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .score-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .score-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .score {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .vs {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 12px;
    }

    .prob-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .prob {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
      transition: color 0.2s ease;
    }

    .prob-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .prob.up { color: var(--green); }
    .prob.down { color: var(--red); }
    .prob.flat { color: var(--text); }

    .detail {
      text-align: right;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .error {
      display: none;
      margin-bottom: 14px;
      background: rgba(239,68,68,0.12);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 12px;
      padding: 12px 14px;
    }

    .note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    @media (max-width: 820px) {
      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body { padding: 14px; }

      .header {
        flex-direction: column;
        align-items: stretch;
      }

      .header-right {
        align-items: flex-start;
        text-align: left;
      }

      .title { font-size: 26px; }
      .prob { font-size: 30px; }
      .score { font-size: 24px; }
      .team { font-size: 18px; }
      .summary { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1 class="title">SeedMoney Live</h1>
        <div class="sub">Live scoring + dynamic win probability</div>
      </div>
      <div class="header-right">
        <button class="button" id="refreshBtn">Refresh now</button>
        <div class="stamp" id="lastUpdated">Waiting for first update…</div>
      </div>
    </div>

    <div class="error" id="errorBox"></div>

    <div class="summary">
      <div class="summary-card">
        <div class="summary-label">Teams</div>
        <div class="summary-value" id="summaryTeams">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Live</div>
        <div class="summary-value" id="summaryLive">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Winners</div>
        <div class="summary-value" id="summaryWinners">0</div>
      </div>
      <div class="summary-card">
        <div class="summary-label">Avg Win %</div>
        <div class="summary-value" id="summaryAvgProb">0%</div>
      </div>
    </div>

    <div class="grid" id="cards"></div>

    <div class="note">
      Edit the <strong>MY_TEAMS</strong> array only. Pregame uses your baseline probability. Live games update the probability from score margin + time remaining. Finals lock to 100% or 0%.
    </div>
  </div>

  <script>
    /*
      ==========================================================
      EDIT THIS SECTION
      ==========================================================
      Use ESPN team names when possible.
      pregameProb is decimal:
      0.94 = 94%
    */
    const MY_TEAMS = [
      { team: "Duke Blue Devils", short: "Duke", seed: 1, pregameProb: 0.94 },
      { team: "Michigan State Spartans", short: "Michigan St.", seed: 2, pregameProb: 0.60 },
      { team: "VCU Rams", short: "VCU", seed: 11, pregameProb: 0.43 },
      { team: "North Dakota State Bison", short: "NDSU", seed: 14, pregameProb: 0.06 }
    ];

    const SCOREBOARD_URL = "https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard";

    /*
      ==========================================================
      HELPERS
      ==========================================================
    */
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function probToLogit(prob) {
      const p = clamp(prob, 0.001, 0.999);
      return Math.log(p / (1 - p));
    }

    function logitToProb(logitValue) {
      return 1 / (1 + Math.exp(-logitValue));
    }

    function pct(prob) {
      return `${Math.round(prob * 100)}%`;
    }

    function safeNum(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : 0;
    }

    function normalize(str) {
      return String(str || "")
        .toLowerCase()
        .replace(/&/g, "and")
        .replace(/\./g, "")
        .replace(/-/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function parseClockToSeconds(displayClock) {
      if (!displayClock || typeof displayClock !== "string") return 0;
      const [m, s] = displayClock.split(":").map(Number);
      if (Number.isNaN(m) || Number.isNaN(s)) return 0;
      return (m * 60) + s;
    }

    // College basketball regulation: 40 minutes = 2400 sec
    function calcSecondsRemaining(period, displayClock) {
      const clockSeconds = parseClockToSeconds(displayClock);

      if (!period || period <= 0) return 2400;
      if (period === 1) return 1200 + clockSeconds;
      if (period === 2) return clockSeconds;

      // OT: treat as very late/high leverage
      return clockSeconds;
    }

    function statusToSimple(statusName) {
      if (statusName === "STATUS_IN_PROGRESS") return "live";
      if (statusName === "STATUS_FINAL") return "final";
      if (statusName === "STATUS_SCHEDULED") return "scheduled";
      return "other";
    }

    function badgeText(simpleStatus) {
      if (simpleStatus === "live") return "LIVE";
      if (simpleStatus === "final") return "FINAL";
      if (simpleStatus === "scheduled") return "PRE";
      return "OFF";
    }

    function badgeClass(simpleStatus) {
      if (simpleStatus === "live") return "badge live";
      if (simpleStatus === "final") return "badge final";
      if (simpleStatus === "scheduled") return "badge pre";
      return "badge off";
    }

    function getPeriodText(period) {
      if (period === 1) return "1H";
      if (period === 2) return "2H";
      if (period > 2) return `OT${period - 2}`;
      return "";
    }

    /*
      ==========================================================
      LIVE WIN PROBABILITY
      ==========================================================
      This is a lightweight approximation:
      - starts from pregame probability
      - score margin matters more later
      - optional possession bump if ESPN exposes it
    */
    function calcLiveWinProb({
      pregameProb,
      teamScore,
      oppScore,
      secondsRemaining,
      totalGameSeconds = 2400,
      possession = 0
    }) {
      const scoreDiff = teamScore - oppScore;
      const elapsedPct = 1 - (secondsRemaining / totalGameSeconds);

      const scoreWeight = 0.05 + (elapsedPct * 0.55);
      const possWeight = 0.04 + (elapsedPct * 0.22);

      const baseLogit = probToLogit(pregameProb);
      const liveLogit =
        baseLogit +
        (scoreDiff * scoreWeight) +
        (possession * possWeight);

      return clamp(logitToProb(liveLogit), 0.001, 0.999);
    }

    /*
      ==========================================================
      TEAM ALIASES
      ==========================================================
    */
    const TEAM_ROWS = MY_TEAMS.map(team => ({
      ...team,
      aliases: [
        team.team,
        team.short,
        team.team.replace("State", "St."),
        team.team.replace("St.", "State"),
        team.team.replace("North", "N."),
        team.team.replace("Saint", "St."),
        team.team.replace("St.", "Saint")
      ].filter(Boolean)
    }));

    /*
      ==========================================================
      INITIAL RENDER
      ==========================================================
    */
    const cardsEl = document.getElementById("cards");
    const errorBox = document.getElementById("errorBox");
    const lastUpdatedEl = document.getElementById("lastUpdated");

    function renderInitialCards() {
      cardsEl.innerHTML = TEAM_ROWS.map((team, idx) => `
        <div class="card" id="card-${idx}">
          <div>
            <div class="topline">
              <div>
                <div class="seed">#${team.seed ?? ""} seed</div>
                <div class="team">${team.short || team.team}</div>
              </div>
              <div class="${badgeClass("scheduled")}" id="badge-${idx}">${badgeText("scheduled")}</div>
            </div>

            <div class="score-row">
              <div class="score-box">
                <div class="score-label">Your team</div>
                <div class="score" id="yourScore-${idx}">--</div>
              </div>

              <div class="vs">VS</div>

              <div class="score-box">
                <div class="score-label" id="oppName-${idx}">Opponent</div>
                <div class="score" id="oppScore-${idx}">--</div>
              </div>
            </div>
          </div>

          <div class="bottom">
            <div class="prob-wrap">
              <div class="prob flat" id="prob-${idx}">${pct(team.pregameProb)}</div>
              <div class="prob-label" id="probLabel-${idx}">Win Rd1</div>
            </div>

            <div class="detail" id="detail-${idx}">
              Waiting for matchup<br />
              Pregame baseline
            </div>
          </div>
        </div>
      `).join("");

      document.getElementById("summaryTeams").textContent = TEAM_ROWS.length;
    }

    renderInitialCards();

    /*
      ==========================================================
      ESPN FETCH + PARSE
      ==========================================================
    */
    async function fetchScoreboard() {
      const response = await fetch(SCOREBOARD_URL, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Scoreboard fetch failed (${response.status})`);
      }
      return response.json();
    }

    function parseEvent(event) {
      const comp = event?.competitions?.[0];
      if (!comp) return null;

      const competitors = comp.competitors || [];
      const home = competitors.find(c => c.homeAway === "home");
      const away = competitors.find(c => c.homeAway === "away");
      if (!home || !away) return null;

      const simpleStatus = statusToSimple(event?.status?.type?.name || "");
      const situation = comp.situation || null;

      let possessionTeamId = null;
      if (situation?.possession) {
        possessionTeamId = String(situation.possession);
      } else if (situation?.lastPlay?.team?.id) {
        possessionTeamId = String(situation.lastPlay.team.id);
      }

      return {
        id: String(event.id || ""),
        date: event.date || "",
        status: simpleStatus,
        rawStatus: event?.status?.type?.name || "",
        clock: event?.status?.displayClock || "",
        period: safeNum(event?.status?.period),
        possessionTeamId,
        home: {
          id: String(home?.team?.id || ""),
          name: home?.team?.displayName || "",
          short: home?.team?.shortDisplayName || "",
          score: safeNum(home?.score)
        },
        away: {
          id: String(away?.team?.id || ""),
          name: away?.team?.displayName || "",
          short: away?.team?.shortDisplayName || "",
          score: safeNum(away?.score)
        }
      };
    }

    function teamMatchesName(candidateName, aliases) {
      const candidate = normalize(candidateName);
      return aliases.some(alias => {
        const a = normalize(alias);
        return candidate === a || candidate.includes(a) || a.includes(candidate);
      });
    }

    function findEventForTeam(teamRow, events) {
      for (const ev of events) {
        if (!ev) continue;

        const homeMatch =
          teamMatchesName(ev.home.name, teamRow.aliases) ||
          teamMatchesName(ev.home.short, teamRow.aliases);

        const awayMatch =
          teamMatchesName(ev.away.name, teamRow.aliases) ||
          teamMatchesName(ev.away.short, teamRow.aliases);

        if (homeMatch || awayMatch) {
          return {
            event: ev,
            isHome: homeMatch
          };
        }
      }
      return null;
    }

    /*
      ==========================================================
      UI UPDATE
      ==========================================================
    */
    function updateCard(idx, found) {
      const badgeEl = document.getElementById(`badge-${idx}`);
      const yourScoreEl = document.getElementById(`yourScore-${idx}`);
      const oppNameEl = document.getElementById(`oppName-${idx}`);
      const oppScoreEl = document.getElementById(`oppScore-${idx}`);
      const probEl = document.getElementById(`prob-${idx}`);
      const probLabelEl = document.getElementById(`probLabel-${idx}`);
      const detailEl = document.getElementById(`detail-${idx}`);

      const teamRow = TEAM_ROWS[idx];
      const pre = teamRow.pregameProb;

      if (!found) {
        badgeEl.className = badgeClass("other");
        badgeEl.textContent = badgeText("other");
        yourScoreEl.textContent = "--";
        oppNameEl.textContent = "Opponent";
        oppScoreEl.textContent = "--";
        probEl.textContent = pct(pre);
        probEl.className = "prob flat";
        probLabelEl.textContent = "Win Rd1";
        detailEl.innerHTML = `No matchup found<br />Pregame baseline`;

        return { status: "other", prob: pre, winner: false };
      }

      const { event, isHome } = found;
      const yourTeam = isHome ? event.home : event.away;
      const oppTeam = isHome ? event.away : event.home;

      badgeEl.className = badgeClass(event.status);
      badgeEl.textContent = badgeText(event.status);
      oppNameEl.textContent = oppTeam.short || oppTeam.name;

      let liveProb = pre;
      let detailTop = "";
      let detailBottom = "";
      let winner = false;

      if (event.status === "scheduled") {
        yourScoreEl.textContent = "--";
        oppScoreEl.textContent = "--";
        probLabelEl.textContent = "Win Rd1";

        detailTop = event.date
          ? new Date(event.date).toLocaleString([], {
              month: "short",
              day: "numeric",
              hour: "numeric",
              minute: "2-digit"
            })
          : "Scheduled";

        detailBottom = `vs ${oppTeam.short || oppTeam.name}`;
      } else if (event.status === "live") {
        yourScoreEl.textContent = String(yourTeam.score);
        oppScoreEl.textContent = String(oppTeam.score);

        const secondsRemaining = calcSecondsRemaining(event.period, event.clock);

        let possession = 0;
        if (event.possessionTeamId) {
          if (event.possessionTeamId === yourTeam.id) possession = 1;
          else if (event.possessionTeamId === oppTeam.id) possession = -1;
        }

        liveProb = calcLiveWinProb({
          pregameProb: pre,
          teamScore: yourTeam.score,
          oppScore: oppTeam.score,
          secondsRemaining,
          possession
        });

        probLabelEl.textContent = "Live win %";
        detailTop = `${getPeriodText(event.period)} · ${event.clock || ""}`;
        detailBottom = `${yourTeam.score}-${oppTeam.score} vs ${oppTeam.short || oppTeam.name}`;
      } else if (event.status === "final") {
        yourScoreEl.textContent = String(yourTeam.score);
        oppScoreEl.textContent = String(oppTeam.score);

        winner = yourTeam.score > oppTeam.score;
        liveProb = winner ? 1 : 0;

        probLabelEl.textContent = "Final result";
        detailTop = "Final";
        detailBottom = `${yourTeam.score}-${oppTeam.score} vs ${oppTeam.short || oppTeam.name}`;
      } else {
        yourScoreEl.textContent = "--";
        oppScoreEl.textContent = "--";
        probLabelEl.textContent = "Win Rd1";
        detailTop = "Unavailable";
        detailBottom = `vs ${oppTeam.short || oppTeam.name}`;
      }

      probEl.textContent = pct(liveProb);

      if (liveProb > pre + 0.03) probEl.className = "prob up";
      else if (liveProb < pre - 0.03) probEl.className = "prob down";
      else probEl.className = "prob flat";

      detailEl.innerHTML = `${detailTop}<br />${detailBottom}`;

      return {
        status: event.status,
        prob: liveProb,
        winner
      };
    }

    function updateSummary(results) {
      const liveCount = results.filter(r => r.status === "live").length;
      const winners = results.filter(r => r.status === "final" && r.winner).length;
      const avgProb = results.length
        ? results.reduce((sum, r) => sum + r.prob, 0) / results.length
        : 0;

      document.getElementById("summaryLive").textContent = liveCount;
      document.getElementById("summaryWinners").textContent = winners;
      document.getElementById("summaryAvgProb").textContent = pct(avgProb);
    }

    async function refreshBoard() {
      try {
        errorBox.style.display = "none";

        const data = await fetchScoreboard();
        const parsedEvents = (data.events || []).map(parseEvent).filter(Boolean);

        const results = TEAM_ROWS.map((teamRow, idx) => {
          const found = findEventForTeam(teamRow, parsedEvents);
          return updateCard(idx, found);
        });

        updateSummary(results);

        lastUpdatedEl.textContent = `Last updated ${new Date().toLocaleTimeString([], {
          hour: "numeric",
          minute: "2-digit",
          second: "2-digit"
        })}`;
      } catch (error) {
        errorBox.textContent = `Live update failed: ${error.message}`;
        errorBox.style.display = "block";
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", refreshBoard);

    refreshBoard();
    setInterval(refreshBoard, 20000);
  </script>
</body>
</html>
